<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення автомобіля | Luxury Cars</title>
    <link rel="shortcut icon" href="../icons/free-icon-car-transporter-18366050.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/order.css">
</head>
<body>
<div class="order-page-wrapper">
    <h1 class="form-title">Home work for CSS flexbox</h1>
    
    <form class="main-form">
        <div class="form-columns">
            <fieldset>
                <legend>Personal info</legend>
                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" name="fname">
                </div>
                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" name="lname">
                </div>
                <div class="input-group">
                    <label>Birthday</label>
                    <input type="datetime-local">
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <div class="radio-row">
                        <span>Male</span> <input type="radio" name="gender">
                        <span>Female</span> <input type="radio" name="gender" checked>
                    </div>
                </div>
                <div class="input-group">
                    <label>Drive experience</label>
                    <select>
                        <option>---</option>
                        <option>expert</option>
                        <option>more than 10</option>
                        <option>5-10</option>
                        <option>2-5</option>
                        <option>less than 2</option>
                        <option>beginner</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Contacts</legend>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email">
                </div>
                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel">
                </div>
                <div class="input-group">
                    <label>Address</label>
                    <textarea></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Car info</legend>
                <div class="input-group">
                    <label>Brand</label>
                    <select><option>---</option></select>
                </div>
                <div class="input-group">
                    <label>Model</label>
                    <select><option>---</option></select>
                </div>
                <div class="input-group">
                    <label>Used</label>
                    <input type="checkbox" class="chk-left">
                </div>
                <div class="color-row">
                    <label>Red <input type="radio" name="c"></label>
                    <label>Black <input type="radio" name="c"></label>
                    <label>Blue <input type="radio" name="c"></label>
                    <label>White <input type="radio" name="c"></label>
                    <label>Grey <input type="radio" name="c"></label>
                </div>
                <div class="price-section">
                    <label>Price</label>
                    <div class="range-wrapper">
                        <input type="range" name="price" min="10" max="80" step="10" list="tickmarks">
                        <datalist id="tickmarks">
                            <option value="10"></option>
                            <option value="20"></option>
                            <option value="30"></option>
                            <option value="40"></option>
                            <option value="50"></option>
                            <option value="60"></option>
                            <option value="70"></option>
                            <option value="80"></option>
                        </datalist>
                    </div>
                    <div class="range-labels">
                        <span>10</span><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span><span>70</span><span>80</span>
                    </div>
                </div>
            </fieldset>
        </div>

        <div class="form-buttons">
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </div>
    </form>
</div>
</body>
</html>
