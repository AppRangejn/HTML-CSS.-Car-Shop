<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення автомобіля | Luxury Cars</title>
    <link rel="shortcut icon" href="../icons/free-icon-car-transporter-18366050.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/order.css">
</head>
<body>
    <h1 class="form-title">Home work for CSS flexbox</h1>
    
    <form>
        <div class="form-columns">
            <fieldset>
                <legend>Personal info</legend>
                <div class="input-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname">
                </div>
                <div class="input-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname">
                </div>
                <div class="input-group">
                    <label for="birthday">Birthday</label>
                    <input type="datetime-local" id="birthday">
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <div class="radio-row">
                        <label for="male">Male</label>
                        <input type="radio" id="male" name="gender">
                        <label for="female">Female</label>
                        <input type="radio" id="female" name="gender" checked>
                    </div>
                </div>
                <div class="input-group">
                    <label for="experience">Drive experience</label>
                    <select id="experience">
                        <option>---</option>
                        <option>expert</option>
                        <option>more than 10</option>
                        <option>5-10</option>
                        <option>2-5</option>
                        <option>less than 2</option>
                        <option>beginner</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Contacts</legend>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone">
                </div>
                <div class="input-group">
                    <label for="address">Address</label>
                    <textarea id="address"></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Car info</legend>
                <div class="input-group">
                    <label for="brand">Brand</label>
                    <select id="brand"><option>---</option></select>
                </div>
                <div class="input-group">
                    <label for="model">Model</label>
                    <select id="model"><option>---</option></select>
                </div>
                <div class="input-group">
                    <label for="used">Used</label>
                    <input type="checkbox" id="used">
                </div>
                <div class="color-row">
                    <label><input type="radio" name="c"> Red</label>
                    <label><input type="radio" name="c"> Black</label>
                    <label><input type="radio" name="c"> Blue</label>
                    <label><input type="radio" name="c"> White</label>
                    <label><input type="radio" name="c"> Grey</label>
                </div>
                <div class="price-section">
                    <label for="price">Price</label>
                    <input type="range" id="price" min="10" max="80" step="10" list="tickmarks">
                    <datalist id="tickmarks">
                        <option value="10" label="10"></option>
                        <option value="20" label="20"></option>
                        <option value="30" label="30"></option>
                        <option value="40" label="40"></option>
                        <option value="50" label="50"></option>
                        <option value="60" label="60"></option>
                        <option value="70" label="70"></option>
                        <option value="80" label="80"></option>
                    </datalist>
                </div>
            </fieldset>
        </div>

        <div class="form-buttons">
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </div>
    </form>
</body>
</html>
