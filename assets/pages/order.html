<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення автомобіля | Luxury Cars</title>
    <link rel="shortcut icon" href="../icons/free-icon-car-transporter-18366050.png" type="image/x-icon">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header>
        <h1>Оформлення замовлення</h1>
    </header>
<div class="backcolortable">
<main>
    <form>
        <div class="form-wrapper">
        <fieldset>
            <legend>Personal info</legend>

            <div>
                <label>First Name <input type="text" name="first_name"></label>
            </div>

            <div>
                <label>Last Name <input type="text" name="last_name"></label>
            </div>

            <div>
                <label>Birthday <input type="datetime-local" name="birthday"></label>
            </div>

            <div class="gender-group">
                <span>Gender</span>
                <div>
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div>
                <label>Drive experience
                    <select name="experience">
                        <option value="">---</option>
                        <option value="1">1 year</option>
                        <option value="3">3 years</option>
                        <option value="5">5+ years</option>
                    </select>
                </label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Contacts</legend>

            <div>
                <label>Email <input type="email" name="email"></label>
            </div>

            <div>
                <label>Phone <input type="tel" name="phone"></label>
            </div>

            <div>
                <label>Address <textarea name="address" rows="5"></textarea></label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Car info</legend>

            <div>
                <label>Brand
                    <select name="brand">
                        <option value="">---</option>
                        <option value="ford">Ford</option>
                        <option value="toyota">Toyota</option>
                        <option value="bmw">BMW</option>
                    </select>
                </label>
            </div>

            <div>
                <label>Model
                    <select name="model">
                        <option value="">---</option>
                        <option value="mustang">Mustang GT</option>
                        <option value="camry">Camry</option>
                        <option value="m5">M5 F90</option>
                    </select>
                </label>
            </div>

            <div>
                <label><input type="checkbox" name="used"> Used</label>
            </div>

            <div class="color-group">
                <span>Color</span>
                <div>
                <label><input type="radio" name="color" value="red"> Red</label>
                <label><input type="radio" name="color" value="black"> Black</label>
                <label><input type="radio" name="color" value="blue"> Blue</label>
                <label><input type="radio" name="color" value="white"> White</label>
                <label><input type="radio" name="color" value="grey"> Grey</label>
                </div>
            </div>

            <div>
                <label>Price 
                    <input type="range" name="price" min="0" max="100000" list="price-ticks">
                    <datalist id="price-ticks">
                        <option value="0"></option>
                        <option value="12500"></option>
                        <option value="25000"></option>
                        <option value="37500"></option>
                        <option value="50000"></option>
                        <option value="62500"></option>
                        <option value="75000"></option>
                        <option value="87500"></option>
                        <option value="100000"></option>
                    </datalist>
                </label>
            </div>
        </fieldset>
        </div>
        <div>
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </div>
    </form>
    <a href="../../index.html">Повернутися до каталогу</a>
</main>
</div>
</body>
</html>
